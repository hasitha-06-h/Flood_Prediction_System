services:
  flood-prediction-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: flood-prediction-system:latest
    container_name: flood_prediction_app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FLASK_DEBUG=0
      - FLOOD_APP_SECRET_KEY=change-this-secret-in-production
    volumes:
      # Keeps prediction history and the SQLite file across container
      # restarts/rebuilds instead of it living only inside the image layer.
      - flood_db_data:/app/database
    restart: unless-stopped

volumes:
  flood_db_data:
